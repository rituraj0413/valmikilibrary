<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Valmiki Library{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Theme Variables ── */
    [data-theme="dark"] {
      --bg-main:    #1a1a2e;
      --bg-card:    #16213e;
      --bg-deep:    #0f0f23;
      --border:     #2a2a4a;
      --text-main:  #ffffff;
      --text-muted: #888888;
      --text-nav:   #aaaaaa;
      --navbar-bg:  #16213e;
      --table-bg:   #16213e;
      --input-bg:   #0f0f23;
      --row-hover:  rgba(255,255,255,0.04);
    }
    [data-theme="light"] {
      --bg-main:    #f0f2f5;
      --bg-card:    #ffffff;
      --bg-deep:    #e8eaf0;
      --border:     #dee2e6;
      --text-main:  #1a1a2e;
      --text-muted: #666666;
      --text-nav:   #444444;
      --navbar-bg:  #ffffff;
      --table-bg:   #ffffff;
      --input-bg:   #f8f9fa;
      --row-hover:  rgba(0,0,0,0.03);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border-color 0.3s; }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar-custom {
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: var(--text-nav);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .nav-links a:hover { background: var(--bg-deep); color: var(--text-main); }
    .nav-links a.active { background: var(--bg-deep); color: var(--text-main); font-weight: 600; }
    .nav-links a.logout { color: #f87171; }
    .nav-links a.logout:hover { background: #4d1a1a; }

    /* ── Toggle Button ── */
    .theme-toggle {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      margin-left: 12px;
    }
    .theme-toggle:hover { border-color: #4f46e5; }

    /* ── Cards ── */
    .stat-card {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 24px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: block;
      color: var(--text-main);
    }
    .stat-card:hover { transform: translateY(-4px); color: var(--text-main); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .stat-icon  { font-size: 32px; margin-bottom: 12px; }
    .stat-value { font-size: 36px; font-weight: 700; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Tables ── */
    .vl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .vl-table th {
      background: var(--bg-deep);
      color: var(--text-muted);
      padding: 12px 14px;
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
    }
    .vl-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
    }
    .vl-table tr:hover td { background: var(--row-hover); }
    .vl-table tr:last-child td { border-bottom: none; }

    /* ── Forms ── */
    .vl-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text-main);
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
      transition: border 0.2s;
    }
    .vl-input:focus { border-color: #4f46e5; }
    .vl-label {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Shift badges ── */
    .badge-shift { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
    .morning { background: #1d6fa4; color: white; }
    .evening { background: #7b2d8b; color: white; }
    .fullday { background: #a84432; color: white; }

    /* ── Misc ── */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .page-wrapper { padding: 28px; }
  </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar-custom">
  <a href="{% url 'dashboard' %}" class="navbar-brand">📚 Valmiki Library</a>
  <div class="nav-links">
    <a href="{% url 'dashboard' %}"       {% if request.resolver_match.url_name == 'dashboard'      %}class="active"{% endif %}>🏠 Home</a>
    <a href="{% url 'student_list' %}"    {% if request.resolver_match.url_name == 'student_list'   %}class="active"{% endif %}>👤 Students</a>
    <a href="{% url 'seating_chart' %}"   {% if request.resolver_match.url_name == 'seating_chart'  %}class="active"{% endif %}>🪑 Seats</a>
    <a href="{% url 'payment_ledger' %}"  {% if request.resolver_match.url_name == 'payment_ledger' %}class="active"{% endif %}>📒 Ledger</a>
    <a href="{% url 'defaulters' %}"      {% if request.resolver_match.url_name == 'defaulters'     %}class="active"{% endif %}>⚠️ Dues</a>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
      🌙 Dark
    </button>

    <a href="{% url 'logout' %}" class="logout">🚪 Logout</a>
  </div>
</div>

<!-- Page Content -->
<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

<!-- Theme Script -->
<script>
  // Load saved theme on every page
  const saved = localStorage.getItem('valmiki-theme') || 'dark';
  applyTheme(saved);

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('themeBtn');
    if (btn) {
      btn.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }
    localStorage.setItem('valmiki-theme', theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
</script>

</body>
</html>
